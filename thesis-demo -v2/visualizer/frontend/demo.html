<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>算法演示 | Stage4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css?v=24">
    <link rel="stylesheet" href="css/layout.css?v=24">
    <link rel="stylesheet" href="css/components.css?v=24">
    <link rel="stylesheet" href="css/demo.css?v=24">
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="demo-3d">

    <div class="loading-3d" id="loading3d">
        <div class="loader-ring"></div>
        <div class="loader-text">初始化引擎...</div>
    </div>

    <nav class="top-nav">
        <div class="nav-brand">
            <div class="logo">
                <a href="index.html" style="display:flex;align-items:center;gap:var(--spacing-xs);text-decoration:none;color:inherit;">
                    <span class="logo-icon">&#9672;</span>
                    <span class="logo-text">Stage4</span>
                </a>
            </div>
            <span class="nav-tagline">算法演示</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="compress.html" class="nav-link">压缩工具</a>
            <a href="demo2d.html" class="nav-link">2D 演示</a>
            <a href="general-compress.html" class="nav-link">通用压缩</a>
            <a href="sgy-viewer.html" class="nav-link">SEG-Y 查看</a>
        </div>
    </nav>

    <div id="three-container" style="display:none;"></div>

    <div class="canvas2d-stage" id="canvas2dStage" style="display:flex;">
        <canvas id="main2dCanvas"></canvas>
    </div>

    <div class="demo-overlay">
        <div id="offlineBadge">离线模式</div>

        <nav class="demo-step-tabs" id="stepTabs">
            <button class="demo-step-tab active" data-step="0">1. Bit 拆解</button>
            <button class="demo-step-tab" data-step="1">2. 特征提取</button>
            <button class="demo-step-tab" data-step="2">3. CNN 预测</button>
            <button class="demo-step-tab" data-step="3">4. Range Coding</button>
            <button class="demo-step-tab" data-step="4">5. 压缩汇总</button>
        </nav>

        <aside class="demo-left-panel" id="leftPanel">
            <div class="panel-title">控制面板</div>
            <div class="demo-control">
                <label>数据源 <span id="dataSourceLabel" style="color:var(--demo-exp);font-weight:600;">模拟</span></label>
                <input type="file" id="sgyFileInput" accept=".sgy,.segy" style="display:none;">
                <button class="demo-btn demo-btn-secondary" style="width:100%;margin-bottom:4px;" id="btnLoadSGY">加载 SEG-Y 文件</button>
                <div id="sgyLoadStatus" style="font-size:10px;color:var(--demo-text-muted);margin-top:2px;"></div>
            </div>
            <div class="demo-control">
                <label>数据集</label>
                <select id="datasetSelect">
                    <option value="tui" selected>TUI Block</option>
                    <option value="postdata">PostData</option>
                    <option value="demo">Synthetic</option>
                </select>
            </div>
            <div class="demo-control">
                <label>采样点 <span class="slider-value" id="sampleIdxVal">0</span></label>
                <input type="range" id="sampleSlider" min="0" max="999" value="0">
            </div>
            <div class="demo-control">
                <label>播放速度 <span class="slider-value" id="speedVal">3</span></label>
                <input type="range" id="speedSlider" min="1" max="10" value="3">
            </div>
            <div class="demo-btn-row">
                <button class="demo-btn demo-btn-primary" id="btnPlay">播放</button>
                <button class="demo-btn demo-btn-secondary" id="btnPause">暂停</button>
            </div>
            <div style="margin-top:10px;">
                <span class="status-badge status-paused" id="statusBadge">已暂停</span>
            </div>
            <div class="demo-control" style="margin-top:16px;">
                <label>当前坐标</label>
                <div class="coord-box">
                    Profile: <span id="coordP">0</span><br>
                    Trace: <span id="coordT">0</span><br>
                    Sample: <span id="coordS">0</span>
                </div>
            </div>
        </aside>

        <aside class="demo-right-panel" id="rightPanel">
            <div class="panel-title">原理与公式</div>
            <div id="infoContent">
                <div class="formula-box" id="formulaBox"></div>
                <p class="info-text" id="infoText"></p>
            </div>
            <div class="panel-title" style="margin-top:18px;">实时指标</div>
            <div id="metricsContent"></div>
        </aside>

        <div class="demo-bottom-nav">
            <button class="btn btn-secondary" id="prevStepBtn">上一步</button>
            <span class="demo-step-label" id="stepLabel">步骤 1 / 5</span>
            <button class="btn btn-primary" id="nextStepBtn">下一步</button>
        </div>
    </div>

    <script src="js/utils.js?v=24"></script>
    <script src="js/api.js?v=24"></script>
    <script src="js/navigation.js?v=24"></script>
    <script src="js/modules/webgl/utils.js?v=24"></script>
    <script src="js/modules/webgl/SceneManager.js?v=24"></script>
    <script src="js/modules/webgl/CameraController.js?v=24"></script>
    <script src="js/modules/webgl/StepRenderer.js?v=24"></script>
    <script src="js/modules/webgl/DemoAPI.js?v=24"></script>
    <script src="js/modules/webgl/steps/Step1BitDecomposer.js?v=24"></script>
    <script src="js/modules/webgl/steps/Step2CausalPatch.js?v=24"></script>
    <script src="js/modules/webgl/steps/Step3CNNPredict.js?v=24"></script>
    <script src="js/modules/webgl/steps/Step4RangeCoding.js?v=24"></script>
    <script src="js/modules/webgl/steps/Step5StrategyCompare.js?v=24"></script>
    <script src="js/modules/webgl/steps/Step6Dashboard.js?v=24"></script>
    <script src="js/demo-app.js?v=24"></script>
</body>
</html>
